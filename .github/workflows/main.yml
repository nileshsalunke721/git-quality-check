name: Quality check

on:
  push:
    branches: [ main ]

jobs:

  test:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v6

      - name: setup python
        uses: actions/setup-python@v6
        with:
          python-version: 3.13

      - name: install libraries
        run: pip install -r requirements.txt

      - name: run test cases
        run: pytest --cov=calc --cov-report=html --cov-report=term --cov-fail-under=80

      - name: upload report
        uses: actions/upload-artifact@v4
        with:
          name: quality-report
          path: htmlcov/

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: checkout code
        uses: actions/checkout@v6

      - name: deployment status
        run: echo "application has been deployed...."